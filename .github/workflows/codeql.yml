name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '22 4 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CODE_SCANNING_ENABLED: ${{ vars.CODE_SCANNING_ENABLED || 'false' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    if: env.CODE_SCANNING_ENABLED == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          languages: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2

  codeql_disabled_notice:
    name: CodeQL Disabled
    runs-on: ubuntu-latest
    if: env.CODE_SCANNING_ENABLED != 'true'
    permissions:
      contents: read
    steps:
      - name: Explain why CodeQL is skipped
        run: |
          echo "CodeQL is skipped because repository variable CODE_SCANNING_ENABLED is not set to true."
          echo "Enable GitHub code scanning in the repository settings, then set CODE_SCANNING_ENABLED=true to activate this workflow."
