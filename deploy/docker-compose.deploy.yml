version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: 3dpricey-${APP_ENV}-postgres
    environment:
      POSTGRES_DB: 3dpricey
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 3dpricey-network

  redis:
    image: redis:7-alpine
    container_name: 3dpricey-${APP_ENV}-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - 3dpricey-network

  minio:
    image: minio/minio:latest
    container_name: 3dpricey-${APP_ENV}-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 3dpricey-network

  backend:
    image: ${REGISTRY_IMAGE}/backend:${APP_IMAGE_TAG}
    container_name: 3dpricey-${APP_ENV}-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/3dpricey
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      API_PORT: 3001
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: "false"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - 3dpricey-network
    restart: unless-stopped

  frontend:
    image: ${REGISTRY_IMAGE}/frontend:${APP_IMAGE_TAG}
    container_name: 3dpricey-${APP_ENV}-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    networks:
      - 3dpricey-network
    restart: unless-stopped

  newt:
    image: fosrl/newt:latest
    container_name: 3dpricey-${APP_ENV}-newt
    env_file:
      - ./.env
    command: ["newt", "--blueprint-file", "${PANGOLIN_BLUEPRINT_FILE}"]
    volumes:
      - ./deploy/blueprints:/blueprints:ro
    networks:
      - 3dpricey-network
    restart: unless-stopped

  # SSH access for CI/CD deployments
  ssh:
    image: linuxserver/openssh-server:latest
    container_name: 3dpricey-${APP_ENV}-ssh
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      SUDO_ACCESS: "false"
      USER_NAME: deploy
    ports:
      - "2222:2222"
    volumes:
      - ./ssh_authorized_keys:/home/deploy/.ssh/authorized_keys:ro
      - /opt/3dpricey:/opt/3dpricey
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - 3dpricey-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  3dpricey-network:
    driver: bridge
