services:
  postgres:
    image: postgres:15-alpine
    container_name: 3dpricey-${APP_ENV}-postgres
    environment:
      POSTGRES_DB: 3dpricey
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d 3dpricey"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      pangolin-default:
        aliases:
          - postgres

  redis:
    image: redis:7-alpine
    container_name: 3dpricey-${APP_ENV}-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      3dpricey-network:
        aliases:
          - redis

  minio:
    image: minio/minio:latest
    container_name: 3dpricey-${APP_ENV}-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      pangolin-default:
        aliases:
          - minio

  backend:
    image: ghcr.io/${GHCR_OWNER:-lucianpetri}/3dpricey-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: 3dpricey-${APP_ENV}-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/3dpricey
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      API_PORT: 3001
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: "false"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pangolin-default
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER:-lucianpetri}/3dpricey-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: 3dpricey-${APP_ENV}-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - pangolin-default
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  pangolin-default:
    external: true
