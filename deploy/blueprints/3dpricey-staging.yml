public-resources:
  3dpricey-staging:
    name: 3DPricey Staging
    protocol: http
    full-domain: staging.printel.ro
    targets:
      - hostname: localhost
        port: 3001
        method: http
        path: /api
        path-match: prefix
        priority: 10
      - hostname: localhost
        port: 8080
        method: http
        path: /
        path-match: prefix
        priority: 100
