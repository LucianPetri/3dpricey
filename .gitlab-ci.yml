stages:
  - validate
  - deploy

variables:
  SSH_USER: ${SSH_USER:-deploy}
  SSH_PORT: ${SSH_PORT:-22}

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "staging"
    - if: $CI_COMMIT_BRANCH == "main"
    - when: never

validate_code:
  stage: validate
  image: node:20-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "staging"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - echo "✓ Frontend validation passed"

unit_tests:
  stage: validate
  image: node:20-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "staging"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - |
      if find backend -type f \( -name "*test.ts" -o -name "*spec.ts" \) | grep -q .; then
        cd backend
        npm ci
        npm run test
        cd ..
      else
        echo "No backend tests found"
      fi
    - |
      if find frontend -type f \( -name "*test.ts" -o -name "*spec.ts" \) | grep -q .; then
        cd frontend
        npm ci
        npm run test --if-present
        cd ..
      else
        echo "No frontend tests found"
      fi

.deploy_template:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client rsync git
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p "$SSH_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
    - ssh -p "$SSH_PORT" "$SSH_USER@$DEPLOY_HOST" "mkdir -p /opt/3dpricey-$APP_ENV" 2>/dev/null || true
  script:
    - |
      ssh -p "$SSH_PORT" "$SSH_USER@$DEPLOY_HOST" "
        cd /opt/3dpricey-$APP_ENV
        git clone --depth=1 --branch=$CI_COMMIT_BRANCH https://git.xaiko.cloud/xaiko/3dpricey.git . 2>/dev/null || git -C . pull
        cat > .env.$APP_ENV <<EOF
      APP_ENV=$APP_ENV
      DB_USER=$DB_USER
      DB_PASSWORD=$DB_PASSWORD
      DATABASE_URL=postgresql://$DB_USER:$DB_PASSWORD@postgres:5432/3dpricey
      JWT_SECRET=$JWT_SECRET
      JWT_EXPIRY=7d
      REFRESH_TOKEN_EXPIRY=30d
      API_PORT=3001
      NODE_ENV=production
      FRONTEND_URL=$FRONTEND_URL
      REDIS_URL=redis://redis:6379
      MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY
      MINIO_SECRET_KEY=$MINIO_SECRET_KEY
      MINIO_ENDPOINT=minio:9000
      MINIO_BUCKET=$MINIO_BUCKET
      MINIO_REGION=us-east-1
      MINIO_PUBLIC_URL=$MINIO_PUBLIC_URL
      MINIO_USE_SSL=false
      VITE_API_URL=$VITE_API_URL
      PANGOLIN_ENDPOINT=$PANGOLIN_ENDPOINT
      NEWT_ID=$NEWT_ID
      NEWT_SECRET=$NEWT_SECRET
      PANGOLIN_BLUEPRINT_FILE=$PANGOLIN_BLUEPRINT_FILE
      EOF
        docker compose --env-file .env.$APP_ENV -f docker-compose.deploy.yml build
        docker compose --env-file .env.$APP_ENV -f docker-compose.deploy.yml up -d
      "

# Dev

deploy_dev:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  variables:
    DEPLOY_HOST: 3dpricey-dev-ssh
    APP_ENV: dev
    DB_USER: $DEV_DB_USER
    DB_PASSWORD: $DEV_DB_PASSWORD
    JWT_SECRET: $DEV_JWT_SECRET
    MINIO_ACCESS_KEY: $DEV_MINIO_ACCESS_KEY
    MINIO_SECRET_KEY: $DEV_MINIO_SECRET_KEY
    MINIO_BUCKET: $DEV_MINIO_BUCKET
    MINIO_PUBLIC_URL: $DEV_MINIO_PUBLIC_URL
    FRONTEND_URL: https://dev.printel.ro
    VITE_API_URL: https://dev.printel.ro/api
    PANGOLIN_ENDPOINT: $DEV_PANGOLIN_ENDPOINT
    NEWT_ID: $DEV_NEWT_ID
    NEWT_SECRET: $DEV_NEWT_SECRET
    PANGOLIN_BLUEPRINT_FILE: /blueprints/3dpricey-dev.yml
  environment:
    name: dev
    url: https://dev.printel.ro

# Staging

deploy_staging:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: manual
  variables:
    DEPLOY_HOST: 3dpricey-staging-ssh
    APP_ENV: staging
    DB_USER: $STAGING_DB_USER
    DB_PASSWORD: $STAGING_DB_PASSWORD
    JWT_SECRET: $STAGING_JWT_SECRET
    MINIO_ACCESS_KEY: $STAGING_MINIO_ACCESS_KEY
    MINIO_SECRET_KEY: $STAGING_MINIO_SECRET_KEY
    MINIO_BUCKET: $STAGING_MINIO_BUCKET
    MINIO_PUBLIC_URL: $STAGING_MINIO_PUBLIC_URL
    FRONTEND_URL: https://staging.printel.ro
    VITE_API_URL: https://staging.printel.ro/api
    PANGOLIN_ENDPOINT: $STAGING_PANGOLIN_ENDPOINT
    NEWT_ID: $STAGING_NEWT_ID
    NEWT_SECRET: $STAGING_NEWT_SECRET
    PANGOLIN_BLUEPRINT_FILE: /blueprints/3dpricey-staging.yml
  environment:
    name: staging
    url: https://staging.printel.ro

# Prod

deploy_prod:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  variables:
    DEPLOY_HOST: 3dpricey-prod-ssh
    APP_ENV: prod
    DB_USER: $PROD_DB_USER
    DB_PASSWORD: $PROD_DB_PASSWORD
    JWT_SECRET: $PROD_JWT_SECRET
    MINIO_ACCESS_KEY: $PROD_MINIO_ACCESS_KEY
    MINIO_SECRET_KEY: $PROD_MINIO_SECRET_KEY
    MINIO_BUCKET: $PROD_MINIO_BUCKET
    MINIO_PUBLIC_URL: $PROD_MINIO_PUBLIC_URL
    FRONTEND_URL: https://printel.ro
    VITE_API_URL: https://printel.ro/api
    PANGOLIN_ENDPOINT: $PROD_PANGOLIN_ENDPOINT
    NEWT_ID: $PROD_NEWT_ID
    NEWT_SECRET: $PROD_NEWT_SECRET
    PANGOLIN_BLUEPRINT_FILE: /blueprints/3dpricey-prod.yml
  environment:
    name: prod
    url: https://printel.ro
    deployment_tier: production
